name: Source compatibility

on:
  workflow_dispatch:
    inputs:
      engine_ref:
        description: andy-engine revision to test
        required: true
        default: main
      tui_ref:
        description: andy-tui2 revision to test
        required: true
        default: main

permissions:
  contents: read

jobs:
  source-compat:
    name: Engine and TUI source compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Andy CLI
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: andy-cli

      - name: Checkout Andy Engine
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: rivoli-ai/andy-engine
          ref: ${{ inputs.engine_ref }}
          path: sources/andy-engine

      - name: Checkout Andy TUI
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: rivoli-ai/andy-tui2
          ref: ${{ inputs.tui_ref }}
          path: sources/andy-tui2

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 8.0.x

      - name: Build and test source compatibility
        working-directory: andy-cli
        env:
          ANDY_SKIP_OLLAMA: '1'
        run: >-
          scripts/check-source-compat.sh
          --engine-src "${GITHUB_WORKSPACE}/sources/andy-engine"
          --tui-src "${GITHUB_WORKSPACE}/sources/andy-tui2"
          --engine-revision "${{ inputs.engine_ref }}"
          --tui-revision "${{ inputs.tui_ref }}"
