name: Release Build

# On-demand cross-platform release. Build the binaries only when you want a new
# version - never on every merge:
#   * push a tag:        git tag v2026.6.16 && git push origin v2026.6.16   (builds + publishes a GitHub Release)
#   * or run manually:   Actions -> "Release Build" -> Run workflow          (builds + smoke-tests; publishes only on a tag)
#
# Pipeline: secret-scan (gate) -> validate (build+test gate) -> build (6 targets, + SBOM)
#           -> smoke-test -> publish Release (+ SHA256SUMS, SBOM, build provenance attestation).
#
# Release artifacts are produced ONLY here, in CI, from the clean revision that the
# triggering tag points at (see the `ref` on each checkout). Never publish a locally
# built binary; scripts/build-release.sh is for local verification only.
#
# Supply-chain hardening:
#   * Every third-party action is pinned to an immutable commit SHA (the trailing
#     "# vX.Y.Z" comment is informational only - the SHA is what runs).
#   * The gitleaks scanner is pinned to a fixed version and its archive checksum is
#     verified before it is executed (no "download latest").
#
# The signing/notarization variant lives in release-signed-todo.yml. That workflow does
# NOT yet produce signed output (no certificates are configured) - see its header.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 2026.6.16). Defaults to the current date when omitted.'
        required: false
        type: string

permissions:
  contents: read

# Pinned tool versions (kept here so a single edit updates the whole pipeline).
env:
  # gitleaks release used by the secret-scan gate. Bump the version AND the checksum together;
  # get the checksum from gitleaks_<ver>_checksums.txt on the corresponding GitHub release.
  GITLEAKS_VERSION: '8.30.1'
  GITLEAKS_LINUX_X64_SHA256: '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb'
  # CycloneDX .NET global tool used to generate the SBOM.
  CYCLONEDX_VERSION: '5.5.0'

jobs:
  # 0) Full validation gate (build, format, full test suite + coverage, vulnerability
  #    audit, secret scan, packaged smoke). Nothing is built or published unless this
  #    passes, so a release can never skip the test suite. Shared with PR CI via ci.yml.
  validate:
    name: Validate
    uses: ./.github/workflows/validate.yml

  # 1) Gate: refuse to build/publish a tree that contains secrets. Runs before anything is built,
  #    so a version that leaks a secret is never produced. Scans the working tree as it will be
  #    compiled (--no-git), which is what ends up "in the app". The scanner itself is pinned to a
  #    fixed version and checksum-verified before execution.
  secret-scan:
    name: Secret scan (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Scan for secrets with gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          VER="${GITLEAKS_VERSION}"
          ARCHIVE="gitleaks_${VER}_linux_x64.tar.gz"
          echo "Using gitleaks v${VER}"
          curl -fsSL -o "$ARCHIVE" "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/${ARCHIVE}"
          # Verify the downloaded archive against the pinned checksum BEFORE extracting/executing it.
          echo "${GITLEAKS_LINUX_X64_SHA256}  ${ARCHIVE}" | sha256sum -c -
          tar -xzf "$ARCHIVE" gitleaks
          # --no-git scans the checked-out files (what gets compiled), not historical commits.
          # Exit non-zero (fail the release) if anything is found.
          ./gitleaks detect --no-git --source . --redact --verbose --exit-code 1

  # 3) Build all six platform binaries (self-contained, single-file, trimmed) via the shared
  #    script, and generate a CycloneDX SBOM of the CLI project. Checks out the exact triggering
  #    revision (the tag) so the release is reproducible from a clean tagged source.
  build:
    name: Build binaries
    needs: [validate, secret-scan]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ github.ref }}  # build from the clean tagged revision that triggered this run

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4.3.1
        with:
          dotnet-version: '8.0.x'

      # Gate: the pinned global.json band must resolve to a .NET 8 SDK.
      # See docs/SDK_AND_DEPENDENCIES.md (issue #172).
      - name: Assert .NET 8 SDK
        run: |
          chmod +x scripts/assert-sdk-version.sh
          scripts/assert-sdk-version.sh

      # Reproducible restore from the committed packages.lock.json graph.
      - name: Restore dependencies
        run: dotnet restore --locked-mode

      - name: Determine version
        id: get_version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(date +%Y.%m.%d)"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Build release binaries
        run: |
          chmod +x scripts/build-release.sh
          ./scripts/build-release.sh "${{ steps.get_version.outputs.VERSION }}"

      - name: Generate SBOM (CycloneDX, pinned)
        run: |
          set -euo pipefail
          dotnet tool install --global CycloneDX --version "${CYCLONEDX_VERSION}"
          export PATH="$PATH:$HOME/.dotnet/tools"
          # CycloneDX .NET global tool v5.5.0 flags (see `dotnet CycloneDX --help`):
          #   -j  / --json      produce a JSON BOM (there is NO "-F/--format" switch; "-F Json" errors)
          #   -fn / --filename  exact output filename, written verbatim into the -o directory
          dotnet CycloneDX src/Andy.Cli/Andy.Cli.csproj -o release-artifacts -j -fn sbom.json
          # Guard: downstream steps hardcode release-artifacts/sbom.json, so normalise the
          # filename in case a future tool version changes its default naming.
          if [ ! -f release-artifacts/sbom.json ]; then
            produced="$(find release-artifacts -maxdepth 1 \( -name 'sbom*.json' -o -name 'bom*.json' \) | head -1)"
            [ -n "$produced" ] || { echo "SBOM generation produced no JSON file"; exit 1; }
            mv "$produced" release-artifacts/sbom.json
          fi
          echo "SBOM written to release-artifacts/sbom.json"

      - name: Generate aggregate checksums
        run: |
          set -euo pipefail
          cd release-artifacts
          sha256sum ./*.tar.gz ./*.zip sbom.json > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: release-binaries
          path: |
            release-artifacts/*.tar.gz
            release-artifacts/*.zip
            release-artifacts/*.sha256
            release-artifacts/sbom.json
            release-artifacts/SHA256SUMS.txt
          retention-days: 30

  # 4) Smoke test: each binary is exercised on its native platform through startup, version,
  #    help, a non-network tool path, and headless schema validation (scripts/smoke-test.sh).
  #    Covers both architectures on macOS plus x64 Linux/Windows on standard runners;
  #    linux-arm64 and win-arm64 are built but not smoke-tested here (no free arm64 Linux/Windows
  #    runners) - add `ubuntu-24.04-arm` / `windows-11-arm` entries if those runners are available.
  smoke-test:
    name: Smoke test ${{ matrix.artifact }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: andy-cli-linux-x64
            archive: andy-cli-linux-x64.tar.gz
          - os: macos-latest      # Apple Silicon; the x64 binary runs under Rosetta 2
            artifact: andy-cli-macos-x64      # (macos-13 Intel runners are retired — jobs
            archive: andy-cli-macos-x64.tar.gz  # requesting them queue forever)
          - os: macos-14          # Apple Silicon
            artifact: andy-cli-macos-arm64
            archive: andy-cli-macos-arm64.tar.gz
          - os: windows-latest
            artifact: andy-cli-windows-x64
            archive: andy-cli-windows-x64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ github.ref }}  # provides scripts/smoke-test.sh matching this revision

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: release-binaries
          path: dist

      - name: Extract and smoke test
        shell: bash
        env:
          EXPECTED: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          archive="$(find dist -name '${{ matrix.archive }}' | head -1)"
          [ -n "$archive" ] || { echo "archive '${{ matrix.archive }}' not found under dist/"; exit 1; }
          mkdir run
          # Extract by archive type. GNU/Git-Bash tar CANNOT read ZIP archives, so the
          # Windows .zip needs a real ZIP extractor (unzip where present, else 7z which is
          # on the GitHub windows runners). tar handles the .tar.gz platforms.
          case "$archive" in
            *.zip)
              if command -v unzip >/dev/null 2>&1; then
                unzip -q "$archive" -d run
              elif command -v 7z >/dev/null 2>&1; then
                7z x -orun "$archive" >/dev/null
              else
                echo "no ZIP extractor (unzip/7z) available to unpack '$archive'"; exit 1
              fi
              ;;
            *.tar.gz|*.tgz)
              tar -xzf "$archive" -C run
              ;;
            *)
              echo "unsupported archive type: '$archive'"; exit 1
              ;;
          esac
          bash scripts/smoke-test.sh run "$EXPECTED"

  # 5) Publish the GitHub Release (web) with auto-generated notes plus a human summary, attach the
  #    SBOM and checksums, and record signed build-provenance attestations for every artifact. Tags only.
  release:
    name: Publish GitHub Release
    needs: [build, smoke-test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the release
      id-token: write       # mint the OIDC token used to sign the provenance attestation
      attestations: write   # record the build-provenance attestation
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0  # full history so we can diff against the previous tag

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: release-binaries
          path: release-artifacts

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2.4.0
        with:
          subject-path: |
            release-artifacts/*.tar.gz
            release-artifacts/*.zip
            release-artifacts/sbom.json

      - name: Build release summary
        run: |
          set -euo pipefail
          VERSION="${{ needs.build.outputs.version }}"
          PREV="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          {
            echo "## andy-cli ${VERSION}"
            echo
            echo "Self-contained binaries for Linux, macOS and Windows (x64 and arm64) - no .NET runtime required. Download the archive for your platform, extract, and run."
            echo
            echo "### Changes"
            if [ -n "$PREV" ]; then
              git log --no-merges --pretty='- %s' "${PREV}..${GITHUB_REF_NAME}"
            else
              git log --no-merges --pretty='- %s' -n 20
            fi
            echo
            echo "### Verify downloads"
            echo "SHA256SUMS.txt lists every platform archive plus sbom.json. Verify just the"
            echo "file(s) you downloaded - --ignore-missing skips entries you do not have:"
            echo '```'
            echo "sha256sum --ignore-missing -c SHA256SUMS.txt"
            echo '```'
            echo
            echo "### Provenance and SBOM"
            echo "- \`sbom.json\` is a CycloneDX software bill of materials for this build."
            echo "- Each archive carries a signed build-provenance attestation. Verify with:"
            echo '```'
            echo "gh attestation verify <archive> --repo ${GITHUB_REPOSITORY}"
            echo '```'
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Publish release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8  # v2.3.2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: true  # appends GitHub's auto PR/commit changelog under the summary
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/*.zip
            release-artifacts/*.sha256
            release-artifacts/sbom.json
            release-artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
