name: Validate

# Reusable validation pipeline shared by pull-request CI (ci.yml) and the
# release workflows (release.yml, release-signed.yml). It is the single source
# of truth for the quality gates every change and every release must pass:
#   * restore + build (compiler warnings stay visible, never suppressed)
#   * dotnet format verification (no uncommitted formatting changes)
#   * the FULL test suite with code coverage + a readable coverage summary
#   * transitive vulnerability audit (fails on High/Critical advisories)
#   * secret scan of the working tree (gitleaks)
#   * cross-platform packaged-binary smoke test + headless contract/schema tests
#
# Called via `uses: ./.github/workflows/validate.yml` with `workflow_call`.
on:
  workflow_call:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

jobs:
  # 1) Build + format + full test suite with coverage. This is the primary gate.
  build-test:
    name: Build, format and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '8.0.x'  # latest 8.0 SDK; exact 8.0.0 is no longer downloadable

      - name: Restore dependencies
        run: dotnet restore Andy.Cli.sln --locked-mode

      # Warnings are intentionally NOT suppressed and NOT promoted to errors:
      # they must remain visible in the build log so regressions are noticed.
      - name: Build (warnings visible)
        run: dotnet build Andy.Cli.sln --configuration Release --no-restore

      # Verify the tree is already formatted. Local equivalent: `dotnet format`.
      - name: Verify formatting
        run: dotnet format Andy.Cli.sln --verify-no-changes --no-restore

      # Full test suite with Cobertura coverage collection.
      - name: Run tests with coverage
        run: >-
          dotnet test Andy.Cli.sln
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
          --logger "trx;LogFileName=test-results.trx"

      # Render a human-readable coverage summary into the job summary panel.
      - name: Generate coverage summary
        if: always()
        run: |
          set -euo pipefail
          dotnet tool install --global dotnet-reportgenerator-globaltool >/dev/null 2>&1 || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          if ls ./TestResults/*/coverage.cobertura.xml >/dev/null 2>&1; then
            reportgenerator \
              -reports:"./TestResults/*/coverage.cobertura.xml" \
              -targetdir:"./TestResults/CoverageReport" \
              -reporttypes:"MarkdownSummaryGithub;TextSummary"
            if [ -f ./TestResults/CoverageReport/SummaryGithub.md ]; then
              cat ./TestResults/CoverageReport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
            fi
            cat ./TestResults/CoverageReport/Summary.txt || true
          else
            echo "No coverage.cobertura.xml produced; skipping coverage summary." | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: |
            ./TestResults/**/coverage.cobertura.xml
            ./TestResults/CoverageReport/**
          retention-days: 14
          if-no-files-found: ignore

  # 2) Supply-chain gates: transitive vulnerability audit + secret scan.
  security:
    name: Vulnerability audit and secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '8.0.x'  # latest 8.0 SDK; exact 8.0.0 is no longer downloadable

      - name: Restore dependencies
        run: dotnet restore Andy.Cli.sln --locked-mode

      # Fail the job if any High or Critical advisory affects a direct OR
      # transitive package. The report is always printed for triage.
      - name: Audit transitive dependencies for vulnerabilities
        run: |
          set -euo pipefail
          echo "Scanning direct and transitive packages for known vulnerabilities..."
          # Do NOT swallow the command's failure: a restore/network error must
          # fail the job, never read as "clean". dotnet list exits 0 even when
          # it reports vulnerabilities, so any non-zero exit here is a real tool
          # error and must abort the gate rather than pass silently.
          if ! report="$(dotnet list Andy.Cli.sln package --vulnerable --include-transitive)"; then
            echo "$report"
            echo "::error::dotnet list --vulnerable failed (restore/network error); dependency audit could not run."
            exit 1
          fi
          echo "$report"
          if echo "$report" | grep -Eiq '\b(High|Critical)\b'; then
            echo "::error::High or Critical severity vulnerabilities found in dependencies."
            exit 1
          fi
          echo "No High/Critical vulnerabilities detected."

      # Secret scan. This repo deliberately downloads a pinned gitleaks binary
      # (fixed version + verified sha256) instead of a third-party marketplace
      # action, so no unpinned Action code runs in CI. The version is pinned
      # rather than resolved via an unauthenticated api.github.com latest-release
      # lookup, which is rate-limited (60/hr/IP) and would fail the job flakily
      # on busy PRs. Bump GITLEAKS_VERSION and the checksum together; the
      # checksum comes from the release's gitleaks_<version>_checksums.txt.
      - name: Scan for secrets with gitleaks
        env:
          GITLEAKS_VERSION: '8.18.4'
          GITLEAKS_LINUX_X64_SHA256: 'ba6dbb656933921c775ee5a2d1c13a91046e7952e9d919f9bac4cec61d628e7d'
        run: |
          set -euo pipefail
          echo "Using gitleaks v${GITLEAKS_VERSION}"
          curl -fsSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_LINUX_X64_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          # --no-git scans the checked-out working tree (what actually gets compiled).
          ./gitleaks detect --no-git --source . --redact --verbose --exit-code 1

  # 3) Packaged-binary smoke test + headless contract/schema tests across OSes.
  #    ubuntu-latest is the baseline; macos-latest covers the packaged binary on
  #    Apple platforms. Both run the schema/contract tests to catch OS-specific
  #    JSON/serialization differences.
  smoke:
    name: Packaged smoke and headless contract (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runtime: linux-x64
            exe: andy-cli
          - os: macos-latest
            runtime: osx-arm64
            exe: andy-cli
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '8.0.x'  # latest 8.0 SDK; exact 8.0.0 is no longer downloadable

      - name: Restore dependencies
        run: dotnet restore Andy.Cli.sln --locked-mode

      # Headless contract/schema tests: validate the canonical JSON schemas and
      # the headless config contract on this OS. These tests are hermetic (no
      # network, no model key) so they are safe to run in CI.
      - name: Run headless contract and schema tests
        run: >-
          dotnet test tests/Andy.Cli.Tests/Andy.Cli.Tests.csproj
          --configuration Release
          --filter "FullyQualifiedName~HeadlessConfigSchemaTests|FullyQualifiedName~HeadlessConfigContractTests"

      # Build the packaged, self-contained single-file binary for this runner.
      - name: Publish packaged binary
        run: >-
          dotnet publish src/Andy.Cli/Andy.Cli.csproj
          --configuration Release
          --runtime ${{ matrix.runtime }}
          --self-contained true
          --output ./smoke-publish
          -p:PublishSingleFile=true

      # Smoke: the packaged binary must launch and report a version string.
      # --help is intentionally not exercised here because it enters the
      # interactive TUI, which requires a real terminal.
      - name: Smoke test packaged binary (--version)
        run: |
          set -euo pipefail
          chmod +x ./smoke-publish/${{ matrix.exe }}
          out="$(./smoke-publish/${{ matrix.exe }} --version)"
          echo "Version output: $out"
          echo "$out" | grep -q "andy-cli"

      - name: Smoke test packaged ACP handshake
        run: >-
          python3 scripts/acp-smoke.py
          ./smoke-publish/${{ matrix.exe }}
          --cwd "${GITHUB_WORKSPACE}"
